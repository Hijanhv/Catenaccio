<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BF0C0"/><stop offset="1" stop-color="#17A87E"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#36E2A6"/>
    </marker>
  </defs>

  <rect width="1120" height="470" rx="18" fill="#06080B"/>
  <rect x="1" y="1" width="1118" height="468" rx="18" fill="none" stroke="rgba(255,255,255,0.06)"/>

  <!-- header -->
  <path d="M40 30 L57 37 V50 C57 60 50 66 40 70 C30 66 23 60 23 50 V37 Z" fill="rgba(54,226,166,0.08)" stroke="url(#g)" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M42 38 L34 50 H39 L37 60 L47 46 H41 Z" fill="url(#g)"/>
  <text x="75" y="48" fill="#E9EEF5" font-size="22" font-weight="600" letter-spacing="2">CATENACCIO</text>
  <text x="75" y="66" fill="#8A94A6" font-size="12" letter-spacing="1">In-play market-making agent · system architecture · TxLINE × Solana</text>
  <text x="1080" y="58" text-anchor="end" fill="#5A6373" font-size="11">deterministic · event-sourced</text>

  <!-- stage panels -->
  <g>
    <!-- S1 TxLINE -->
    <rect x="36" y="110" width="168" height="320" rx="14" fill="#0C0F14" stroke="rgba(255,255,255,0.07)"/>
    <text x="120" y="135" text-anchor="middle" fill="#8A94A6" font-size="11" letter-spacing="1.5">TXLINE FEED</text>
    <rect x="52" y="152" width="136" height="56" rx="9" fill="#11151C" stroke="rgba(54,226,166,0.25)"/>
    <text x="120" y="176" text-anchor="middle" fill="#E9EEF5" font-size="12.5" font-weight="600">Odds SSE</text>
    <text x="120" y="193" text-anchor="middle" fill="#8A94A6" font-size="10.5">de-margined Pct consensus</text>
    <rect x="52" y="220" width="136" height="56" rx="9" fill="#11151C" stroke="rgba(54,226,166,0.25)"/>
    <text x="120" y="244" text-anchor="middle" fill="#E9EEF5" font-size="12.5" font-weight="600">Scores SSE</text>
    <text x="120" y="261" text-anchor="middle" fill="#8A94A6" font-size="10.5">sub-second confirmed goals</text>
    <rect x="52" y="288" width="136" height="50" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="120" y="309" text-anchor="middle" fill="#E9EEF5" font-size="12" font-weight="600">Replay / updates</text>
    <text x="120" y="325" text-anchor="middle" fill="#8A94A6" font-size="10.5">gap backfill + demo</text>

    <!-- S2 Ingestion -->
    <rect x="244" y="110" width="178" height="320" rx="14" fill="#0C0F14" stroke="rgba(255,255,255,0.07)"/>
    <text x="333" y="135" text-anchor="middle" fill="#8A94A6" font-size="11" letter-spacing="1.5">INGESTION</text>
    <rect x="260" y="152" width="146" height="44" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="333" y="179" text-anchor="middle" fill="#E9EEF5" font-size="12">Resilient SSE · reconnect</text>
    <rect x="260" y="206" width="146" height="44" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="333" y="233" text-anchor="middle" fill="#E9EEF5" font-size="12">Sequence-gap backfill</text>
    <rect x="260" y="260" width="146" height="44" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="333" y="287" text-anchor="middle" fill="#E9EEF5" font-size="12">Normalise → EventStream</text>
    <rect x="260" y="314" width="146" height="44" rx="9" fill="#11151C" stroke="rgba(54,226,166,0.25)"/>
    <text x="333" y="341" text-anchor="middle" fill="#36E2A6" font-size="12">Merkle verify (TxLINE)</text>

