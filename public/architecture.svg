  <rect x="478" y="186" width="198" height="42" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="577" y="212" text-anchor="middle" fill="#0B0F16" font-size="12">Quote · bid/ask ± spread · skew</text>
  <rect x="478" y="234" width="198" height="42" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="577" y="260" text-anchor="middle" fill="#0B0F16" font-size="12">Cross-market consistency guard</text>
  <rect x="478" y="282" width="198" height="46" rx="9" fill="rgba(10,160,110,0.10)" stroke="#0AA06E" stroke-width="1.5"/>
  <text x="577" y="303" text-anchor="middle" fill="#077E57" font-size="12.5" font-weight="700">Hot path</text>
  <text x="577" y="319" text-anchor="middle" fill="#0AA06E" font-size="10.5">goal → suspend → reprice ~400ms</text>
  <rect x="478" y="334" width="198" height="40" rx="9" fill="#fff" stroke="rgba(229,72,77,0.30)"/>
  <text x="577" y="359" text-anchor="middle" fill="#C0392F" font-size="12">Risk · caps · drawdown kill-switch</text>

