    <text x="992" y="135" text-anchor="middle" fill="#B89CFF" font-size="11" letter-spacing="1.5">SOLANA + SURFACES</text>
    <rect x="916" y="152" width="152" height="50" rx="9" fill="#11151C" stroke="rgba(153,69,255,0.30)"/>
    <text x="992" y="174" text-anchor="middle" fill="#E9EEF5" font-size="12" font-weight="600">Txoracle · validate_stat</text>
    <text x="992" y="190" text-anchor="middle" fill="#8A94A6" font-size="10">verify data (0 Rust)</text>
    <rect x="916" y="212" width="152" height="50" rx="9" fill="#11151C" stroke="rgba(153,69,255,0.30)"/>
    <text x="992" y="234" text-anchor="middle" fill="#E9EEF5" font-size="12" font-weight="600">Memo · anchor root</text>
    <text x="992" y="250" text-anchor="middle" fill="#8A94A6" font-size="10">tamper-evident log</text>
    <rect x="916" y="272" width="152" height="44" rx="9" fill="#11151C" stroke="rgba(54,226,166,0.25)"/>
    <text x="992" y="299" text-anchor="middle" fill="#36E2A6" font-size="12">Dashboard (Next.js)</text>
    <rect x="916" y="326" width="152" height="44" rx="9" fill="#11151C" stroke="rgba(54,226,166,0.25)"/>
    <text x="992" y="353" text-anchor="middle" fill="#36E2A6" font-size="12">MCP server (for agents)</text>
