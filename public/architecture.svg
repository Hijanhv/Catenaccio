    <text x="577" y="270" text-anchor="middle" fill="#E9EEF5" font-size="12">Cross-market consistency guard</text>
    <rect x="478" y="292" width="198" height="46" rx="9" fill="rgba(54,226,166,0.10)" stroke="url(#g)" stroke-width="1.5"/>
    <text x="577" y="313" text-anchor="middle" fill="#36E2A6" font-size="12.5" font-weight="700">⚡ HOT PATH</text>
    <text x="577" y="329" text-anchor="middle" fill="#8FE9CC" font-size="10.5">goal → suspend → reprice ~400ms</text>
    <rect x="478" y="344" width="198" height="40" rx="9" fill="#11151C" stroke="rgba(255,107,94,0.25)"/>
    <text x="577" y="369" text-anchor="middle" fill="#FF9A90" font-size="12">Risk · caps · drawdown kill-switch</text>

