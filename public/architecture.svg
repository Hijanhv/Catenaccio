<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="ballg" x1="-20" y1="-20" x2="20" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C58C"/><stop offset="1" stop-color="#077E57"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="470" rx="18" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1119" height="469" rx="18" fill="none" stroke="rgba(12,18,32,0.10)"/>

  <!-- header: football logo + title -->
  <g transform="translate(46,44) scale(0.62)">
    <circle cx="0" cy="0" r="25" fill="#fff" stroke="#0B0F16" stroke-width="2.4"/>
    <line x1="0" y1="-9" x2="0" y2="-23" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="8.56" y1="-2.78" x2="22.8" y2="-7.4" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="5.29" y1="7.28" x2="14.1" y2="19.4" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5.29" y1="7.28" x2="-14.1" y2="19.4" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-8.56" y1="-2.78" x2="-22.8" y2="-7.4" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="0,-9 8.56,-2.78 5.29,7.28 -5.29,7.28 -8.56,-2.78" fill="url(#ballg)"/>
  </g>
  <text x="74" y="40" fill="#0B0F16" font-size="21" font-weight="700" letter-spacing="2">CATENACCIO</text>
  <text x="74" y="60" fill="#566173" font-size="12" letter-spacing="0.5">In-play market-making agent · system architecture · TxLINE × Solana</text>
  <text x="1080" y="52" text-anchor="end" fill="#98A1B0" font-size="11">deterministic · event-sourced</text>

  <!-- S1 TxLINE -->
  <rect x="36" y="100" width="168" height="320" rx="14" fill="#F6F8FB" stroke="rgba(12,18,32,0.09)"/>
  <text x="120" y="125" text-anchor="middle" fill="#566173" font-size="11" letter-spacing="1.5">TXLINE FEED</text>
  <rect x="52" y="142" width="136" height="56" rx="9" fill="#fff" stroke="rgba(10,160,110,0.30)"/>
  <text x="120" y="166" text-anchor="middle" fill="#0B0F16" font-size="12.5" font-weight="600">Odds SSE</text>
  <text x="120" y="183" text-anchor="middle" fill="#566173" font-size="10.5">de-margined Pct consensus</text>
  <rect x="52" y="210" width="136" height="56" rx="9" fill="#fff" stroke="rgba(10,160,110,0.30)"/>
  <text x="120" y="234" text-anchor="middle" fill="#0B0F16" font-size="12.5" font-weight="600">Scores SSE</text>
  <text x="120" y="251" text-anchor="middle" fill="#566173" font-size="10.5">sub-second confirmed goals</text>
  <rect x="52" y="278" width="136" height="50" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="120" y="299" text-anchor="middle" fill="#0B0F16" font-size="12" font-weight="600">Replay / updates</text>
  <text x="120" y="315" text-anchor="middle" fill="#566173" font-size="10.5">gap backfill + demo</text>

  <!-- S2 Ingestion -->
  <rect x="244" y="100" width="178" height="320" rx="14" fill="#F6F8FB" stroke="rgba(12,18,32,0.09)"/>
  <text x="333" y="125" text-anchor="middle" fill="#566173" font-size="11" letter-spacing="1.5">INGESTION</text>
  <rect x="260" y="142" width="146" height="44" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="333" y="169" text-anchor="middle" fill="#0B0F16" font-size="12">Resilient SSE · reconnect</text>
  <rect x="260" y="196" width="146" height="44" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="333" y="223" text-anchor="middle" fill="#0B0F16" font-size="12">Sequence-gap backfill</text>
  <rect x="260" y="250" width="146" height="44" rx="9" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
  <text x="333" y="277" text-anchor="middle" fill="#0B0F16" font-size="12">Normalise → EventStream</text>
  <rect x="260" y="304" width="146" height="44" rx="9" fill="#fff" stroke="rgba(10,160,110,0.30)"/>
  <text x="333" y="331" text-anchor="middle" fill="#0AA06E" font-size="12" font-weight="600">Merkle verify (TxLINE)</text>

