    <rect x="732" y="110" width="158" height="320" rx="14" fill="#0C0F14" stroke="rgba(255,255,255,0.07)"/>
    <text x="811" y="135" text-anchor="middle" fill="#8A94A6" font-size="11" letter-spacing="1.5">EXECUTION</text>
    <rect x="748" y="156" width="126" height="50" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="811" y="186" text-anchor="middle" fill="#E9EEF5" font-size="12">Order matcher</text>
    <rect x="748" y="218" width="126" height="56" rx="9" fill="#11151C" stroke="rgba(255,107,94,0.25)"/>
    <text x="811" y="242" text-anchor="middle" fill="#FF9A90" font-size="12" font-weight="600">Courtsider sim</text>
    <text x="811" y="259" text-anchor="middle" fill="#8A94A6" font-size="10">calibrated attacker</text>
    <rect x="748" y="286" width="126" height="50" rx="9" fill="#11151C" stroke="rgba(255,255,255,0.07)"/>
    <text x="811" y="316" text-anchor="middle" fill="#E9EEF5" font-size="12">PnL · real fees</text>

