  <!-- arrows -->
  <line x1="206" y1="270" x2="242" y2="270" stroke="#36E2A6" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="424" y1="270" x2="460" y2="270" stroke="#36E2A6" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="694" y1="270" x2="730" y2="270" stroke="#36E2A6" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="892" y1="270" x2="898" y2="270" stroke="#36E2A6" stroke-width="1.6" marker-end="url(#arw)"/>

  <text x="560" y="455" text-anchor="middle" fill="#5A6373" font-size="11">Same events in → same quotes, same P&amp;L, same Merkle root out · replayable &amp; auditable end-to-end</text>
