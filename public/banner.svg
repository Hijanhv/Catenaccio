<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="ballg" x1="1110" y1="70" x2="1190" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C58C"/><stop offset="1" stop-color="#077E57"/>
    </linearGradient>
    <radialGradient id="lift" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0AA06E" stop-opacity="0.16"/><stop offset="1" stop-color="#0AA06E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B0F16" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="22" fill="#F6F8FB"/>
  <rect width="1280" height="360" rx="22" fill="url(#lift)"/>
  <circle cx="1150" cy="120" r="170" fill="url(#lift)"/>
  <rect x="1" y="1" width="1278" height="358" rx="22" fill="none" stroke="rgba(12,18,32,0.07)"/>

  <!-- ── left: brand ── -->
  <!-- logo football -->
  <g transform="translate(70,58)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#0B0F16" stroke-width="2.4"/>
    <line x1="0" y1="-12" x2="0" y2="-32" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="11.4" y1="-3.7" x2="30.4" y2="-9.7" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="9.7" x2="18.7" y2="26" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="9.7" x2="-18.7" y2="26" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-11.4" y1="-3.7" x2="-30.4" y2="-9.7" stroke="#0B0F16" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="0,-9 8.56,-2.78 5.29,7.28 -5.29,7.28 -8.56,-2.78" fill="url(#ballg)"/>
  </g>
  <text x="120" y="56" fill="#0B0F16" font-size="38" font-weight="700" letter-spacing="4">CATENACCIO</text>
  <text x="122" y="78" fill="#566173" font-size="13" letter-spacing="5">IN-PLAY DEFENSE ENGINE</text>

  <!-- tagline -->
  <text x="70" y="180" fill="#0B0F16" font-size="40" font-weight="600">The defense for your <tspan fill="#0AA06E">in-play</tspan> prices.</text>
  <text x="70" y="216" fill="#566173" font-size="17">Autonomous in-play market-making agent · reprices in ~400 ms · proves every price on-chain.</text>

  <!-- chips -->
  <g transform="translate(70,250)" font-size="14">
    <g>
      <rect width="190" height="34" rx="17" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
      <text x="20" y="22" fill="#0B0F16" font-weight="600">⚽ Trading Tools &amp; Agents</text>
    </g>
    <g transform="translate(206,0)">
      <rect width="158" height="34" rx="17" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
      <circle cx="22" cy="17" r="4" fill="#0AA06E"/>
      <text x="34" y="22" fill="#0B0F16" font-weight="600" font-family="ui-monospace,monospace">Sharpe 3.16</text>
    </g>
    <g transform="translate(380,0)">
      <rect width="186" height="34" rx="17" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
      <circle cx="22" cy="17" r="4" fill="#0AA06E"/>
      <text x="34" y="22" fill="#0B0F16" font-weight="600">verifiable on-chain</text>
    </g>
  </g>

  <!-- ── right: candlestick chart + football ── -->
  <g>
    <line x1="840" y1="300" x2="1200" y2="300" stroke="rgba(12,18,32,0.10)"/>
    <polyline points="860,267 900,256 940,239 980,247 1020,223 1060,203 1100,185 1130,150" fill="none" stroke="#0AA06E" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- candles -->
    <g>
      <line x1="860" y1="238" x2="860" y2="297" stroke="#0AA06E" stroke-width="2"/><rect x="853" y="250" width="14" height="35" rx="3" fill="#0AA06E" opacity="0.9"/>
      <line x1="900" y1="228" x2="900" y2="284" stroke="#E5484D" stroke-width="2"/><rect x="893" y="240" width="14" height="32" rx="3" fill="#E5484D" opacity="0.9"/>
      <line x1="940" y1="208" x2="940" y2="270" stroke="#0AA06E" stroke-width="2"/><rect x="933" y="220" width="14" height="38" rx="3" fill="#0AA06E" opacity="0.9"/>
      <line x1="980" y1="220" x2="980" y2="274" stroke="#E5484D" stroke-width="2"/><rect x="973" y="232" width="14" height="30" rx="3" fill="#E5484D" opacity="0.9"/>
      <line x1="1020" y1="193" x2="1020" y2="254" stroke="#0AA06E" stroke-width="2"/><rect x="1013" y="205" width="14" height="37" rx="3" fill="#0AA06E" opacity="0.9"/>
      <line x1="1060" y1="173" x2="1060" y2="234" stroke="#0AA06E" stroke-width="2"/><rect x="1053" y="185" width="14" height="37" rx="3" fill="#0AA06E" opacity="0.9"/>
      <line x1="1100" y1="153" x2="1100" y2="217" stroke="#0AA06E" stroke-width="2"/><rect x="1093" y="165" width="14" height="40" rx="3" fill="#0AA06E" opacity="0.9"/>
    </g>
    <!-- football over the chart -->
    <g transform="translate(1091.12,56.12) scale(1.84)" filter="url(#soft)">
      <circle cx="32" cy="32" r="25" fill="#fff" stroke="#0B0F16" stroke-width="1.1"/>
      <line x1="32" y1="23" x2="32" y2="8" stroke="#0B0F16" stroke-width="0.85" stroke-linecap="round"/>
      <line x1="40.56" y1="29.22" x2="54.82" y2="24.58" stroke="#0B0F16" stroke-width="0.85" stroke-linecap="round"/>
      <line x1="37.29" y1="39.28" x2="46.11" y2="51.42" stroke="#0B0F16" stroke-width="0.85" stroke-linecap="round"/>
      <line x1="26.71" y1="39.28" x2="17.89" y2="51.42" stroke="#0B0F16" stroke-width="0.85" stroke-linecap="round"/>
      <line x1="23.44" y1="29.22" x2="9.18" y2="24.58" stroke="#0B0F16" stroke-width="0.85" stroke-linecap="round"/>
      <polygon points="32,23 40.56,29.22 37.29,39.28 26.71,39.28 23.44,29.22" fill="url(#ballg)"/>
    </g>
    <g transform="translate(852,84)">
      <rect width="120" height="30" rx="15" fill="#fff" stroke="rgba(12,18,32,0.10)"/>
      <circle cx="18" cy="15" r="4" fill="#0AA06E"/>
      <text x="30" y="19" fill="#0B0F16" font-size="12" font-weight="600" font-family="ui-monospace,monospace">~400ms reprice</text>
    </g>
  </g>
</svg>
