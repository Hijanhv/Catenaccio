<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="ballg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF4A3F"/><stop offset="1" stop-color="#C21E1C"/>
    </linearGradient>
    <radialGradient id="grass" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2AA255" stop-opacity="0.22"/><stop offset="1" stop-color="#2AA255" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="red" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E5342B" stop-opacity="0.16"/><stop offset="1" stop-color="#E5342B" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0C1A10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- pitch-daylight background -->
  <rect width="1280" height="360" rx="22" fill="#F3F8F3"/>
  <circle cx="150" cy="70" r="230" fill="url(#grass)"/>
  <circle cx="1055" cy="150" r="340" fill="url(#grass)"/>
  <circle cx="1030" cy="105" r="150" fill="url(#red)"/>
  <rect x="1" y="1" width="1278" height="358" rx="22" fill="none" stroke="rgba(12,32,18,0.08)"/>

  <!-- ── left: brand ── -->
  <!-- logo: red ball ringed by grass green -->
  <g transform="translate(70,58)">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#12924E" stroke-width="3"/>
    <circle cx="0" cy="0" r="34" fill="url(#ballg)" stroke="#0C1A10" stroke-width="1.6"/>
    <line x1="0" y1="-13" x2="0" y2="-32" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="12.4" y1="-4" x2="31" y2="-9.7" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="7.7" y1="10.6" x2="19.2" y2="26.6" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="-7.7" y1="10.6" x2="-19.2" y2="26.6" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="-12.4" y1="-4" x2="-31" y2="-9.7" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <polygon points="0,-11 10.46,-3.4 6.46,9 -6.46,9 -10.46,-3.4" fill="#fff"/>
  </g>
  <text x="126" y="52" fill="#0C1A10" font-size="38" font-weight="700" letter-spacing="4">CATENACCIO</text>
  <text x="128" y="76" fill="#4E5F53" font-size="13" letter-spacing="5">IN-PLAY DEFENSE ENGINE</text>

  <!-- tagline -->
  <text x="70" y="182" fill="#0C1A10" font-size="40" font-weight="600">The defense for your <tspan fill="#12924E">in-play</tspan> prices.</text>
  <text x="70" y="218" fill="#4E5F53" font-size="17">Autonomous in-play market-making agent · reprices in ~400 ms · proves every price on-chain.</text>

  <!-- chips -->
  <g transform="translate(70,252)" font-size="14">
    <g>
      <rect width="200" height="34" rx="17" fill="#fff" stroke="rgba(12,32,18,0.10)"/>
      <text x="20" y="22" fill="#0C1A10" font-weight="600">⚽ Trading Tools &amp; Agents</text>
    </g>
    <g transform="translate(216,0)">
      <rect width="158" height="34" rx="17" fill="#fff" stroke="rgba(12,32,18,0.10)"/>
      <circle cx="22" cy="17" r="4" fill="#12924E"/>
      <text x="34" y="22" fill="#0C1A10" font-weight="600" font-family="ui-monospace,monospace">Sharpe 3.16</text>
    </g>
    <g transform="translate(390,0)">
      <rect width="196" height="34" rx="17" fill="#fff" stroke="rgba(12,32,18,0.10)"/>
      <circle cx="22" cy="17" r="4" fill="#E5342B"/>
      <text x="34" y="22" fill="#0C1A10" font-weight="600">verifiable on Solana</text>
    </g>
  </g>

  <!-- ── right: a green pitch in perspective, goal + red ball (mirrors the landing hero) ── -->
  <g>
    <!-- mown-grass stripes (far/top narrow → near/bottom wide) -->
    <polygon points="905,78 1155,78 1167,119 893,119" fill="#2AA255"/>
    <polygon points="893,119 1167,119 1180,159 880,159" fill="#1E8145"/>
    <polygon points="880,159 1180,159 1192,200 868,200" fill="#2AA255"/>
    <polygon points="868,200 1192,200 1205,241 855,241" fill="#1E8145"/>
    <polygon points="855,241 1205,241 1217,281 843,281" fill="#2AA255"/>
    <polygon points="843,281 1217,281 1230,322 830,322" fill="#1E8145"/>

    <!-- white markings -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="2.4" stroke-linejoin="round">
      <polygon points="905,78 1155,78 1230,322 830,322"/>
      <line x1="868" y1="200" x2="1192" y2="200"/>
      <!-- penalty + 6-yard boxes at the far goal -->
      <polygon points="985,78 1075,78 1080,116 980,116"/>
      <polygon points="1008,78 1052,78 1054,98 1006,98"/>
    </g>
    <ellipse cx="1030" cy="200" rx="46" ry="15" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.2"/>
    <circle cx="1030" cy="200" r="2.4" fill="#ffffff"/>

    <!-- goal frame at the far edge -->
    <g stroke="#F4F6F8" stroke-width="3" stroke-linecap="round">
      <line x1="996" y1="78" x2="996" y2="56"/>
      <line x1="1064" y1="78" x2="1064" y2="56"/>
      <line x1="996" y1="56" x2="1064" y2="56"/>
    </g>
    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="1">
      <line x1="1007" y1="56" x2="1007" y2="78"/>
      <line x1="1019" y1="56" x2="1019" y2="78"/>
      <line x1="1030" y1="56" x2="1030" y2="78"/>
      <line x1="1041" y1="56" x2="1041" y2="78"/>
      <line x1="1053" y1="56" x2="1053" y2="78"/>
      <line x1="996" y1="63" x2="1064" y2="63"/>
      <line x1="996" y1="70" x2="1064" y2="70"/>
    </g>

    <!-- struck shot: dotted trajectory arcing into the goal -->
    <path d="M 980,252 Q 992,150 1027,98" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round"/>

    <!-- ball contact shadow + the red football crossing the line -->
    <ellipse cx="1030" cy="99" rx="12" ry="3.2" fill="#0C1A10" opacity="0.16"/>
    <g transform="translate(1030,90) scale(0.47) translate(-32,-32)" filter="url(#soft)">
      <circle cx="32" cy="32" r="30" fill="none" stroke="#12924E" stroke-width="3"/>
      <circle cx="32" cy="32" r="25.5" fill="url(#ballg)" stroke="#0C1A10" stroke-width="1.4"/>
      <line x1="32" y1="22" x2="32" y2="8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="41.03" y1="28.56" x2="55.3" y2="24.2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="37.58" y1="39.18" x2="46.9" y2="51.6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="26.42" y1="39.18" x2="17.1" y2="51.6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22.97" y1="28.56" x2="8.7" y2="24.2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <polygon points="32,22 41.03,28.56 37.58,39.18 26.42,39.18 22.97,28.56" fill="#fff"/>
    </g>

    <!-- reprice HUD chip -->
    <g transform="translate(846,300)">
      <rect width="132" height="30" rx="15" fill="#fff" stroke="rgba(12,32,18,0.10)"/>
      <circle cx="18" cy="15" r="4" fill="#12924E"/>
      <text x="30" y="19" fill="#0C1A10" font-size="12" font-weight="600" font-family="ui-monospace,monospace">~400ms reprice</text>
    </g>
  </g>
</svg>
